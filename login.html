<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFinance Multibancos — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-page { flex-direction: column; gap: 0; }
    .error-msg {
      background: rgba(255,77,106,0.1);
      border: 1px solid rgba(255,77,106,0.3);
      color: #FF4D6A;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      display: none;
    }
    .error-msg.show { display: block; }
    .success-msg {
      background: rgba(0,194,255,0.1);
      border: 1px solid rgba(0,194,255,0.3);
      color: var(--cyan);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      display: none;
    }
    .success-msg.show { display: block; }
    .fill-btn {
      font-size: 0.72rem;
      color: var(--cyan);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-bg"></div>

    <div class="login-card">
      <div class="login-logo">
        <div class="brand">Auto<span>Finance</span></div>
        <div class="sub">Simulador Multibancos</div>
      </div>

      <div class="login-form">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
        </div>

        <div id="errorMsg" class="error-msg">E-mail ou senha incorretos.</div>
        <div id="successMsg" class="success-msg"></div>

        <button class="btn btn-primary btn-full btn-lg" id="btnEntrar" onclick="fazerLogin()">
          Entrar
        </button>
        <button class="fill-btn" style="margin-top:12px" onclick="esqueciSenha()">Esqueci minha senha</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script>
    let fb = null;
    window.addEventListener('af-firebase-ready', () => { fb = window.AF_FIREBASE; });

    function setLoading(loading) {
      const btn = document.getElementById('btnEntrar');
      btn.disabled = loading;
      btn.textContent = loading ? 'Entrando...' : 'Entrar';
    }

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const err   = document.getElementById('errorMsg');
      const ok    = document.getElementById('successMsg');
      err.classList.remove('show');
      ok.classList.remove('show');

      if (!email || !senha) {
        err.textContent = 'Informe e-mail e senha.';
        err.classList.add('show');
        return;
      }
      if (!fb) { err.textContent = 'Carregando, tente novamente em um instante.'; err.classList.add('show'); return; }

      setLoading(true);
      try {
        const cred = await fb.signInWithEmailAndPassword(fb.auth, email, senha);
        const snap = await fb.getDoc(fb.doc(fb.db, 'usuarios', cred.user.uid));
        if (!snap.exists()) {
          err.textContent = 'Usuário sem cadastro completo. Contate o administrador.';
          err.classList.add('show');
          setLoading(false);
          return;
        }
        const dados = snap.data();
        const user = { uid: cred.user.uid, email, nome: dados.nome, role: dados.role, loja: dados.loja || '' };
        sessionStorage.setItem('afUser', JSON.stringify(user));
        sessionStorage.setItem('afPrimeiroAcesso', dados.primeiroAcesso ? '1' : '0');
        window.location.href = 'index.html';
      } catch (e) {
        err.textContent = 'E-mail ou senha incorretos.';
        err.classList.add('show');
        setLoading(false);
      }
    }

    async function esqueciSenha() {
      const email = document.getElementById('email').value.trim();
      const err = document.getElementById('errorMsg');
      const ok  = document.getElementById('successMsg');
      err.classList.remove('show');
      ok.classList.remove('show');

      if (!email) {
        err.textContent = 'Digite seu e-mail no campo acima para receber o link de redefinição.';
        err.classList.add('show');
        return;
      }
      if (!fb) { err.textContent = 'Carregando, tente novamente em um instante.'; err.classList.add('show'); return; }

      try {
        await fb.sendPasswordResetEmail(fb.auth, email);
        ok.textContent = 'Enviamos um link de redefinição de senha para seu e-mail.';
        ok.classList.add('show');
      } catch (e) {
        // Não revela se o e-mail existe ou não, por segurança.
        ok.textContent = 'Se este e-mail estiver cadastrado, você receberá um link de redefinição.';
        ok.classList.add('show');
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });

    // Redirecionar se já logado
    if (sessionStorage.getItem('afUser')) window.location.href = 'index.html';
  </script>
</body>
</html>
