<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Setup inicial — Criar Admin</title>
  <style>
    body { font-family: sans-serif; background:#0b0f14; color:#eee; max-width:480px; margin:60px auto; padding:24px; }
    input { width:100%; padding:10px; margin:6px 0 16px; border-radius:6px; border:1px solid #444; background:#1a1f26; color:#fff; }
    button { padding:10px 20px; background:#00c2ff; color:#000; border:none; border-radius:6px; font-weight:700; cursor:pointer; }
    #msg { margin-top:16px; font-size:0.9rem; }
  </style>
</head>
<body>
  <h2>⚙️ Setup inicial — Criar primeiro Admin</h2>
  <p>Use esta página <strong>uma única vez</strong> para criar o usuário administrador no Firebase. Depois disso, apague este arquivo do projeto (ou não publique no Netlify).</p>

  <label>Nome</label>
  <input id="nome" value="Administrador">
  <label>E-mail</label>
  <input id="email" value="admin@autofinance.com">
  <label>Senha</label>
  <input id="senha" type="text" value="" placeholder="Defina uma senha forte">

  <button onclick="criarAdmin()">Criar Admin</button>
  <div id="msg"></div>

  <script type="module" src="js/firebase-config.js"></script>
  <script>
    let fb = null;
    window.addEventListener('af-firebase-ready', () => { fb = window.AF_FIREBASE; });

    async function criarAdmin() {
      const msg = document.getElementById('msg');
      const nome  = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      if (!fb) { msg.textContent = 'Aguarde o Firebase carregar e tente novamente.'; return; }
      if (!email || !senha || senha.length < 6) {
        msg.textContent = 'Preencha e-mail e uma senha com pelo menos 6 caracteres.';
        return;
      }

      try {
        const cred = await fb.createUserWithEmailAndPassword(fb.auth, email, senha);
        await fb.setDoc(fb.doc(fb.db, 'usuarios', cred.user.uid), {
          nome, email, role: 'admin', loja: 'AutoFinance', primeiroAcesso: false,
        });
        msg.style.color = '#00ffaa';
        msg.textContent = '✅ Admin criado com sucesso! Você já pode fazer login normalmente em login.html.';
      } catch (e) {
        msg.style.color = '#ff4d6a';
        msg.textContent = 'Erro: ' + (e.message || e);
      }
    }
  </script>
</body>
</html>
